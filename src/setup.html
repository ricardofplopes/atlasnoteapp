<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' file: data:" />
  <title>AtlasNote — Setup</title>
  <link rel="stylesheet" href="setup.css" />
</head>
<body>
  <div class="container">
    <!-- Draggable title bar -->
    <div class="titlebar">
      <button class="titlebar-close" id="close-btn">✕</button>
    </div>

    <!-- Logo -->
    <div class="logo-section">
      <img src="../assets/icon.png" alt="AtlasNote" class="logo" />
      <h1 class="app-name">Atlas<span class="accent">Note</span></h1>
      <p class="subtitle">Connect to your AtlasNote server</p>
    </div>

    <!-- Form -->
    <div class="form-section">
      <div class="input-group">
        <label for="server-url">Server URL</label>
        <input
          type="url"
          id="server-url"
          placeholder="http://localhost:3000"
          spellcheck="false"
          autocomplete="off"
        />
      </div>

      <div id="status-message" class="status-message hidden"></div>

      <button id="connect-btn" class="connect-btn">
        <span id="btn-text">Connect</span>
        <span id="btn-loader" class="loader hidden"></span>
      </button>
    </div>
  </div>

  <script src="setup.js"></script>
</body>
</html>
